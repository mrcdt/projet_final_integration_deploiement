apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: marinecdt/frontend:latest # N'oublie pas de mettre ton pseudo !
        ports:
        - containerPort: 3000 # <-- CORRECTION ICI (3000 au lieu de 80)
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 3000 # <-- CORRECTION ICI (3000 au lieu de 80)
    nodePort: 30001