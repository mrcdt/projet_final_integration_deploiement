deploy-to-vm:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement sur la VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }} # <-- On utilise le mot de passe ici
          script: |
            # Mise à jour de l'image dans le cluster Kubernetes de la VM
            kubectl set image deployment/backend backend=${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
            # Redémarrage forcé pour appliquer la nouvelle image
            kubectl rollout restart deployment/backend