name: Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dependances
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests
        working-directory: ./backend
        run: npm test

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Connexion DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: marinecdt/backend:latest

      - name: Build et Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: marinecdt/frontend:latest

  deploy:
    name: Deploiement Azure VM (Kubernetes)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploiement sur K3s via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd projet_final_integration_deploiement
            git pull origin main
            
            sudo kubectl apply -f k8s/secret.yml
            sudo kubectl apply -f k8s/deployment.yml
            sudo kubectl apply -f k8s/service.yml
            sudo kubectl apply -f k8s/frontend.yml
            
            sudo kubectl rollout restart deployment backend-deployment
            sudo kubectl rollout restart deployment frontend-deployment
            
            sudo kubectl get pods
            echo "Deploiement sur K3s termine avec succes !"