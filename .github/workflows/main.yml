name: Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # ← v4 (était v3)

      - name: Setup Node.js
        uses: actions/setup-node@v4      # ← v4 (était v3)
        with:
          node-version: '18'

      - name: Installer les dépendances
        working-directory: ./backend
        run: npm install

      - name: Lancer les tests
        working-directory: ./backend
        run: npm test

  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4        # ← v4

      - name: Connexion DockerHub
        uses: docker/login-action@v3     # ← v3 (était v2)
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        uses: docker/build-push-action@v6  # ← v6 (était v4)
        with:
          context: ./backend
          push: true
          tags: marinecdt/backend:latest

      - name: Build et Push Frontend
        uses: docker/build-push-action@v6  # ← v6
        with:
          context: ./frontend
          push: true
          tags: marinecdt/frontend:latest

  deploy:
    name: Déploiement Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déploiement sur la VM Azure via SSH
        uses: appleboy/ssh-action@v1.0.3   # ← version explicite
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            cd projet_final_integration_deploiement
            git pull origin main
            docker-compose pull
            docker-compose up -d
            docker-compose ps
            echo " Déploiement terminé !"