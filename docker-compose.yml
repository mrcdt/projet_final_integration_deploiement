services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_NAME=mydb
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "8081:3000"

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_PASSWORD=password123
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: