<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Application ✨</title>
    <style>
        body { font-family: sans-serif; background: #fce4ec; text-align: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; border: none; border-radius: 10px; background: #ec407a; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Bienvenue sur mon application ✨</h1>
        <button onclick="testConnection()">Tester la connexion Backend</button>
        <div id="resultat" style="margin-top: 20px;"></div>
    </div>

    <script>
        async function testConnection() {
            const resDiv = document.getElementById('resultat');
            try {
                // Utilise localhost en local, ou l'IP de ta VM sur Azure
                const response = await fetch('http://localhost:3000/health');
                const data = await response.json();
                resDiv.innerHTML = `✅ Backend répond : ${data.status}`;
                resDiv.style.color = "green";
            } catch (err) {
                resDiv.innerHTML = "❌ Erreur de connexion au backend.";
                resDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
